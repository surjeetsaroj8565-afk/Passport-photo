<!DOCTYPE html>
<html>
<head>
<title>Passport Photo Tool Fast</title>

<style>
body { text-align:center; font-family:Arial; background:#f0f0f0; }
.container { background:white; padding:20px; margin:20px auto; max-width:400px; border-radius:10px; }
canvas { margin-top:10px; border:1px solid #000; width:100%; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<div class="container">

<h2>📸 Passport Photo Tool</h2>

<input type="file" id="upload" accept="image/*"><br><br>

Photos:
<input type="number" id="count" value="8"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<p id="status"></p>

<canvas id="canvas"></canvas>

</div>

<script>
function generate() {

  let file = document.getElementById("upload").files[0];
  let count = parseInt(document.getElementById("count").value);
  let status = document.getElementById("status");

  if (!file) {
    alert("Upload image first");
    return;
  }

  status.innerText = "⏳ Processing...";

  let reader = new FileReader();

  reader.onload = function(e) {

    let img = new Image();

    img.onload = function() {

      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");

      // A4 size
      let a4_w = 2480;
      let a4_h = 3508;

      canvas.width = a4_w;
      canvas.height = a4_h;

      // Passport size ratio
      let pw = 413;
      let ph = 531;

      let cols = Math.floor(a4_w / pw);
      let rows = Math.floor(a4_h / ph);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, a4_w, a4_h);

      let i = 0;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {

          if (i >= count) break;

          let x = c * pw;
          let y = r * ph;

          // simple center crop
          let size = Math.min(img.width, img.height);
          let sx = (img.width - size) / 2;
          let sy = (img.height - size) / 2;

          ctx.drawImage(
            img,
            sx, sy, size, size,
            x, y,
            pw, ph
          );

          i++;
        }
      }

      status.innerText = "✅ Ready (Fast version)";
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}

function download() {
  let canvas = document.getElementById("canvas");

  if (!canvas.width) {
    alert("Generate first");
    return;
  }

  let link = document.createElement("a");
  link.download = "passport_A4_fast.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
