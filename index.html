<!DOCTYPE html>
<html>
<head>
<title>Passport Photo PRO Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal/dist/background-removal.min.js"></script>

<style>
body { text-align:center; font-family:Arial; background:#f0f0f0; }
.container { background:white; padding:20px; margin:20px auto; max-width:400px; border-radius:10px; }
canvas { margin-top:10px; border:1px solid #000; width:100%; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<div class="container">

<h2>📸 Passport Photo PRO Ultimate</h2>

<input type="file" id="upload"><br><br>

Photos:
<input type="number" id="count" value="8"><br><br>

Background:
<select id="bg">
<option value="white">White</option>
<option value="blue">Blue</option>
</select><br><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<p id="status"></p>

<canvas id="canvas"></canvas>

</div>

<script>
async function generate() {

  let file = document.getElementById("upload").files[0];
  let count = parseInt(document.getElementById("count").value);
  let bgType = document.getElementById("bg").value;
  let status = document.getElementById("status");

  if (!file) {
    alert("Upload image first");
    return;
  }

  status.innerText = "⏳ Processing...";

  let reader = new FileReader();
  reader.readAsDataURL(file);

  reader.onload = async function(e) {

    let img = new Image();
    img.src = e.target.result;

    img.onload = async function() {

      // 🔥 Background removal
      let blob = await removeBackground(img);
      let cleanImg = new Image();
      cleanImg.src = URL.createObjectURL(blob);

      await new Promise(r => cleanImg.onload = r);

      // 🔥 Load face detection model
      await faceapi.nets.tinyFaceDetector.loadFromUri(
        "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/"
      );

      let detection = await faceapi.detectSingleFace(
        cleanImg,
        new faceapi.TinyFaceDetectorOptions()
      );

      let box = detection ? detection.box : {
        x: cleanImg.width * 0.3,
        y: cleanImg.height * 0.2,
        width: cleanImg.width * 0.4,
        height: cleanImg.height * 0.5
      };

      // Better framing
      let sx = box.x - box.width * 0.5;
      let sy = box.y - box.height * 0.8;
      let sw = box.width * 2;
      let sh = box.height * 2;

      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");

      // ✅ A4 size
      let a4_w = 2480;
      let a4_h = 3508;

      canvas.width = a4_w;
      canvas.height = a4_h;

      let pw = 413;
      let ph = 531;

      let cols = Math.floor(a4_w / pw);
      let rows = Math.floor(a4_h / ph);

      let bgColor = bgType === "blue" ? "#87CEFA" : "#ffffff";

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, a4_w, a4_h);

      let i = 0;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {

          if (i >= count) break;

          let x = c * pw;
          let y = r * ph;

          ctx.fillStyle = bgColor;
          ctx.fillRect(x, y, pw, ph);

          // 🔥 Draw face-centered image
          ctx.drawImage(
            cleanImg,
            sx, sy, sw, sh,
            x + 30, y + 30,
            pw - 60, ph - 60
          );

          i++;
        }
      }

      status.innerText = "✅ PRO passport sheet ready!";
    };
  };
}

function download() {
  let canvas = document.getElementById("canvas");

  if (!canvas.width) {
    alert("Generate first");
    return;
  }

  let link = document.createElement("a");
  link.download = "passport_PRO_A4.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
