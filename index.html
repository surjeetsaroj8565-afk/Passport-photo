<!DOCTYPE html>
<html>
<head>
<title>Passport Photo Tool</title>
<style>
body { text-align:center; font-family:Arial; }
canvas { margin-top:10px; border:1px solid #000; }
</style>
</head>

<body>

<h2>Passport Photo Tool</h2>

<input type="file" id="upload"><br><br>

Number of photos:
<input type="number" id="count" value="4"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<br>
<p id="status"></p>

<canvas id="canvas"></canvas>

<script>
function generate() {
  let fileInput = document.getElementById("upload");
  let count = parseInt(document.getElementById("count").value);
  let status = document.getElementById("status");

  if (fileInput.files.length === 0) {
    alert("Please upload image first");
    return;
  }

  let img = new Image();
  img.src = URL.createObjectURL(fileInput.files[0]);

  img.onload = function() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let pw = 200;
    let ph = 250;
    let cols = 2;
    let rows = Math.ceil(count / cols);

    canvas.width = cols * pw;
    canvas.height = rows * ph;

    let i = 0;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (i >= count) break;

        ctx.drawImage(img, c * pw, r * ph, pw, ph);
        i++;
      }
    }

    status.innerText = "✅ Photos generated!";
  };
}

function download() {
  let canvas = document.getElementById("canvas");

  if (canvas.width === 0) {
    alert("Generate photo first");
    return;
  }

  let link = document.createElement("a");
  link.download = "passport.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
